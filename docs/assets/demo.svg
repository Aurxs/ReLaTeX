<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-label="ReLaTeX demo">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="960" height="500" rx="28" fill="url(#bg)"/>

  <g transform="translate(56 54)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Before</text>
    <rect x="0" y="24" width="390" height="350" rx="18" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="24" width="390" height="52" rx="18" fill="#f1f5f9"/>
    <circle cx="28" cy="50" r="7" fill="#f87171"/>
    <circle cx="52" cy="50" r="7" fill="#fbbf24"/>
    <circle cx="76" cy="50" r="7" fill="#34d399"/>
    <text x="26" y="126" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#111827">$A-\lambda I=</text>
    <text x="26" y="164" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#111827">\begin{pmatrix}</text>
    <text x="26" y="202" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#111827">2-\lambda&amp;0\0&amp;3-\lambda</text>
    <text x="26" y="240" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#111827">\end{pmatrix}$</text>
    <text x="26" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#64748b">Raw LaTeX is hard to read.</text>
  </g>

  <g transform="translate(514 54)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#0f172a">After ReLaTeX</text>
    <rect x="0" y="24" width="390" height="350" rx="18" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="24" width="390" height="52" rx="18" fill="#eff6ff"/>
    <circle cx="28" cy="50" r="7" fill="#38bdf8"/>
    <circle cx="52" cy="50" r="7" fill="#34d399"/>
    <circle cx="76" cy="50" r="7" fill="#a7f3d0"/>
    <text x="66" y="158" font-family="Georgia, Times New Roman, serif" font-size="32" font-style="italic" fill="#111827">A - lambda I =</text>
    <line x1="258" y1="104" x2="258" y2="252" stroke="#111827" stroke-width="3"/>
    <line x1="340" y1="104" x2="340" y2="252" stroke="#111827" stroke-width="3"/>
    <text x="278" y="145" font-family="Georgia, Times New Roman, serif" font-size="24" fill="#111827">2-lambda</text>
    <text x="315" y="145" font-family="Georgia, Times New Roman, serif" font-size="24" fill="#111827">0</text>
    <text x="292" y="214" font-family="Georgia, Times New Roman, serif" font-size="24" fill="#111827">0</text>
    <text x="304" y="214" font-family="Georgia, Times New Roman, serif" font-size="24" fill="#111827">3-lambda</text>
    <text x="26" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#2563eb">Rendered locally inside Safari.</text>
  </g>
</svg>
